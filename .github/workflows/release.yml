name: Release

on:
  push:
    branches: [main]
    paths: [manifest.json]

permissions:
  contents: write     # create the release
  id-token: write     # build provenance attestation
  attestations: write # build provenance attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: laughedelic/gha-obsidian/actions/release@main
